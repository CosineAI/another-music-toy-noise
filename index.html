<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mouse Music Toy</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="controls">
    <button id="clearCanvas" class="btn">Clear Screen</button>
    <div class="legend">
      <span><strong>Z</strong> Vibrato</span>
      <span><strong>X</strong> Tremolo</span>
      <span><strong>C</strong> Delay</span>
      <span><strong>V</strong> Distortion</span>
      <span><strong>B</strong> Reverb</span>
      <span><strong>A</strong> Autopan</span>
      <span><strong>F</strong> Flanger</span>
      <span><strong>M</strong> Chorus</span>
      <span><strong>P</strong> Phaser</span>
      <span><strong>H</strong> Highpass</span>
      <span><strong>N</strong> Noise</span>
      <span><strong>R</strong> Ring Mod</span>
      <span><strong>S</strong> Saturation</span>
      <span><strong>Q</strong> Randomize</span>
    </div>
  </div>

  <canvas id="playCanvas" aria-label="Play area: click to sustain notes"></canvas>

  <script src="assets/script.js"></script>
</body>
</html>
